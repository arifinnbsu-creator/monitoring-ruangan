<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Booking Ruangan & Monitoring Pelatihan 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --available: #22c55e;
            --occupied: #ef4444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%);
            color: #fff;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* --- BAGAN RUANGAN --- */
        .floor-plan-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header-info { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .header-info h2 { margin: 0; font-size: 20px; color: #94a3b8; }
        .header-info span { color: var(--primary); font-size: 24px; font-weight: bold; }

        .grid-rooms {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .room-unit {
            height: 140px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            text-align: center;
            padding: 10px;
        }

        .room-unit.available { background: rgba(34, 197, 94, 0.1); border-color: var(--available); color: var(--available); }
        .room-unit.occupied { background: rgba(239, 68, 68, 0.1); border-color: var(--occupied); color: var(--occupied); }
        .room-unit.selected { background: var(--primary); border-color: #fff; color: #fff; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        .room-unit b { font-size: 16px; margin-bottom: 5px; }
        .room-unit .info-training { font-size: 11px; margin-top: 5px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }

        .btn-detail {
            position: absolute; top: 8px; right: 8px;
            background: rgba(255,255,255,0.15); border: none;
            color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 6px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-detail:hover { background: rgba(255,255,255,0.3); }

        /* --- FORM --- */
        .form-side {
            background: var(--card); padding: 30px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); height: fit-content;
        }

        label { font-size: 14px; color: #94a3b8; }
        input, select {
            width: 100%; padding: 12px; margin: 8px 0 18px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-family: inherit;
        }

        .btn-confirm {
            width: 100%; padding: 15px; background: var(--primary);
            border: none; border-radius: 12px; color: #fff; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-confirm:hover { background: #2563eb; transform: scale(1.02); }

        .legend { display: flex; gap: 20px; margin-top: 25px; font-size: 13px; color: #94a3b8; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 15px; height: 15px; border-radius: 4px; }

        /* --- MODAL LAYAR FULL (MONITOR MODE) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; /* Warna solid agar rapi saat fullscreen */
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 50px;
            max-width: 700px;
            width: 85%;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .modal-close {
            position: absolute; top: 25px; right: 25px;
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            font-size: 20px; width: 40px; height: 40px; border-radius: 50%; 
            cursor: pointer; transition: 0.2s;
        }
        .modal-close:hover { background: rgba(239, 68, 68, 0.4); }

        .modal-status-badge {
            display: inline-block; padding: 10px 24px; border-radius: 30px;
            font-weight: 800; font-size: 16px; margin-bottom: 30px; letter-spacing: 1px;
        }
        .badge-available { background: rgba(34, 197, 94, 0.2); color: var(--available); border: 1px solid var(--available); }
        .badge-occupied { background: rgba(239, 68, 68, 0.2); color: var(--occupied); border: 1px solid var(--occupied); }

        .info-row {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 18px 0; font-size: 18px;
        }
        .info-row span:first-child { color: #94a3b8; }
        .info-row span:last-child { font-weight: 600; color: #fff; }

        .btn-fullscreen-trigger {
            margin-top: 30px; width: 100%; padding: 12px;
            background: #475569; color: #fff; border: none;
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-fullscreen-trigger:hover { background: var(--primary); }

        /* Otomatis memperbesar tulisan khusus saat masuk mode Fullscreen Device */
        :-webkit-full-screen .modal-content { max-width: 90%; width: 90%; padding: 80px 50px; }
        :-webkit-full-screen .info-row { font-size: 28px; padding: 30px 0; }
        :-webkit-full-screen #modalRoomName { font-size: 54px; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 30px; font-weight: 800; letter-spacing: -1px;">Room & Training Control Center</h1>

    <div class="main-layout">
        <div class="floor-plan-card">
            <div class="header-info">
                <h2>Cek Ketersediaan Tanggal:</h2>
                <span id="displayDate">Pilih Tanggal...</span>
            </div>

            <div class="grid-rooms" id="roomGrid"></div>

            <div class="legend">
                <div class="legend-item"><div class="box" style="background: var(--available)"></div> Tersedia</div>
                <div class="legend-item"><div class="box" style="background: var(--occupied)"></div> Terpakai</div>
                <div class="legend-item"><div class="box" style="background: var(--primary)"></div> Pilihan Anda</div>
            </div>
        </div>

        <div class="form-side">
            <h3 style="margin-top:0; margin-bottom: 20px;">Form Reservasi</h3>
            
            <label>Pilih Tanggal</label>
            <input type="date" id="inputTanggal" onchange="refreshGrid()">

            <label>Nama Pelatihan/Kegiatan</label>
            <input type="text" id="inputPelatihan" placeholder="Contoh: Workshop Digital Marketing">

            <label>Nama Pemesan (PIC)</label>
            <input type="text" id="inputNama" placeholder="Nama lengkap Anda...">

            <label>Jam Pelaksanaan</label>
            <div style="display: flex; gap:10px">
                <input type="time" id="inputMulai">
                <input type="time" id="inputSelesai">
            </div>

            <button class="btn-confirm" onclick="prosesBooking()">Konfirmasi Pesanan</button>
            <p style="font-size: 11px; color: #64748b; margin-top: 15px; text-align: center;">Data akan otomatis sinkron ke Looker Studio.</p>
            <button onclick="downloadExcel()" style="width:100%; margin-top:10px; background:transparent; border:1px solid #475569; color:#94a3b8; padding:10px; border-radius:10px; cursor:pointer;">Cetak Report .xlsx</button>
        </div>
    </div>

    <div class="modal-overlay" id="roomModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalRoomName" style="margin-top: 0; margin-bottom: 5px; font-size: 36px; letter-spacing: -0.5px;">Nama Ruangan</h2>
            <p id="modalDateInfo" style="color: #94a3b8; margin-top: 0; margin-bottom: 20px; font-size: 16px;">Tanggal Pemantauan</p>
            
            <div id="modalStatusBadge" class="modal-status-badge">TERSEDIA</div>
            
            <div id="modalDetailsContainer" style="margin-top: 10px; text-align: left;">
                </div>

            <button class="btn-fullscreen-trigger" onclick="toggleDeviceFullscreen()">📺 Aktifkan Mode Monitor Fullscreen</button>
        </div>
    </div>

    <script>
        const daftarRuangan = ["Purposeful Work", "Growth Mindset", "Byond The limit", "Dynamic Action", "Collaborative"];
        
        let databaseBooking = [
            { ruangan: "Growth Mindset", tanggal: "2026-04-20", mulai: "08:00", selesai: "12:00", nama: "Budi", pelatihan: "Leadership Training" }
        ];

        let ruanganDipilih = null;

        function refreshGrid() {
            const tglSelected = document.getElementById('inputTanggal').value;
            const grid = document.getElementById('roomGrid');
            const displayDate = document.getElementById('displayDate');
            
            if(!tglSelected) return;

            displayDate.innerText = tglSelected;
            grid.innerHTML = "";
            ruanganDipilih = null;

            daftarRuangan.forEach(nama => {
                const dataEksis = databaseBooking.find(b => b.ruangan === nama && b.tanggal === tglSelected);
                
                const card = document.createElement('div');
                card.className = `room-unit ${dataEksis ? 'occupied' : 'available'}`;
                
                let html = `<b>${nama}</b>`;
                if(dataEksis) {
                    html += `<small>TERISI</small>`;
                    html += `<div class="info-training">${dataEksis.pelatihan}</div>`;
                    html += `<div style="font-size:10px; margin-top:3px">${dataEksis.mulai} - ${dataEksis.selesai}</div>`;
                } else {
                    html += `<small>KOSONG</small>`;
                }

                html += `<button class="btn-detail" onclick="openModal('${nama}', event)">Detail</button>`;
                card.innerHTML = html;

                if(!dataEksis) {
                    card.onclick = function(e) {
                        if(e.target.className === 'btn-detail') return;
                        document.querySelectorAll('.room-unit').forEach(el => el.classList.remove('selected'));
                        card.classList.add('selected');
                        ruanganDipilih = nama;
                    };
                } else {
                    card.onclick = function(e) {
                        openModal(nama, e);
                    };
                }

                grid.appendChild(card);
            });
        }

        function openModal(namaRuangan, event) {
            event.stopPropagation();
            
            const tglSelected = document.getElementById('inputTanggal').value;
            const modal = document.getElementById('roomModal');
            const dataEksis = databaseBooking.find(b => b.ruangan === namaRuangan && b.tanggal === tglSelected);
            
            document.getElementById('modalRoomName').innerText = namaRuangan;
            document.getElementById('modalDateInfo').innerText = `Jadwal Pemakaian Hari: ${tglSelected}`;
            
            const badge = document.getElementById('modalStatusBadge');
            const container = document.getElementById('modalDetailsContainer');
            
            container.innerHTML = "";
            
            if(dataEksis) {
                badge.className = "modal-status-badge badge-occupied";
                badge.innerText = "MOHON MAAF, RUANGAN SEDANG TERPAKAI";
                
                container.innerHTML = `
                    <div class="info-row"><span>Nama Kegiatan</span><span>${dataEksis.pelatihan}</span></div>
                    <div class="info-row"><span>Penanggung Jawab (PIC)</span><span>${dataEksis.nama}</span></div>
                    <div class="info-row"><span>Jam Mulai</span><span>${dataEksis.mulai} WIB</span></div>
                    <div class="info-row"><span>Jam Selesai</span><span>${dataEksis.selesai} WIB</span></div>
                `;
            } else {
                badge.className = "modal-status-badge badge-available";
                badge.innerText = "RUANGAN INI KOSONG / TERSEDIA";
                
                container.innerHTML = `
                    <p style="text-align:center; color:#94a3b8; font-size:16px; margin: 30px 0;">
                        Ruangan siap digunakan. Anda dapat melakukan pemesanan melalui form utama aplikasi.
                    </p>
                `;
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            // Jika sedang mode fullscreen, matikan dulu mode fullscreennya saat pop-up ditutup
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
            document.getElementById('roomModal').classList.remove('active');
        }

        // ENGINE JAVASCRIPT UNTUK MEMAKSA BROWSER MASUK LAYAR PENUH (FULLSCREEN API)
        function toggleDeviceFullscreen() {
            const targetElement = document.getElementById('roomModal');

            if (!document.fullscreenElement) {
                // Perintah masuk mode layar penuh total
                if (targetElement.requestFullscreen) {
                    targetElement.requestFullscreen();
                } else if (targetElement.webkitRequestFullscreen) { /* Safari / Chrome lama */
                    targetElement.webkitRequestFullscreen();
                } else if (targetElement.msRequestFullscreen) { /* IE/Edge lama */
                    targetElement.msRequestFullscreen();
                }
            } else {
                document.exitFullscreen();
            }
        }

        // Listener jika user menekan tombol 'ESC' di keyboard, sistem mendeteksi keluar dari layar penuh
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                console.log('Keluar dari mode monitor TV');
            }
        });

        function prosesBooking() {
            const nama = document.getElementById('inputNama').value;
            const pelatihan = document.getElementById('inputPelatihan').value;
            const tgl = document.getElementById('inputTanggal').value;
            const jamM = document.getElementById('inputMulai').value;
            const jamS = document.getElementById('inputSelesai').value;

            if(!ruanganDipilih || !nama || !pelatihan || !tgl || !jamM || !jamS) {
                alert("Harap pilih ruangan di bagan dan lengkapi seluruh data!");
                return;
            }

            const dataBaru = { ruangan: ruanganDipilih, nama: nama, pelatihan: pelatihan, tanggal: tgl, mulai: jamM, selesai: jamS };
            databaseBooking.push(dataBaru);
            
            const scriptURL = 'https://script.google.com/macros/s/AKfycbyIL1Ik1PGe0yXQEwVlLAFQ_IJ-_fVPqa2-9C0IBKf8SHc7gUMbJeCFA9BMsRbWiO0FfA/exec'; 
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataBaru), headers: { 'Content-Type': 'application/json' }})
            .then(() => console.log('Data disinkronkan'))
            .catch(error => console.error(error));

            alert(`Berhasil memesan Ruangan ${ruanganDipilih}!`);
            document.getElementById('inputNama').value = "";
            document.getElementById('inputPelatihan').value = "";
            refreshGrid();
        }

        function downloadExcel() {
            const ws = XLSX.utils.json_to_sheet(databaseBooking);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "Report_Booking_Ruangan_2026.xlsx");
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputTanggal').value = today;
            refreshGrid();
        };
    </script>
</body>
</html>
